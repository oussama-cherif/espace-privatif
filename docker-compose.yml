services:
  app:
    build: .
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: espace_user
      DB_PASSWORD: secret123
      SOTHIS_WS_URL: ws://sothis:8081
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/var/www/html/storage

  websocket:
    build: .
    command: php bin/websocket-server.php
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: espace_user
      DB_PASSWORD: secret123
    depends_on:
      db:
        condition: service_healthy

  sothis:
    build: .
    command: php mock/sothis_ws_server.php
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: espace_user
      DB_PASSWORD: secret123
      SOTHIS_WS_URL: ws://sothis:8081
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: espace_privatif
      MYSQL_USER: espace_user
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
