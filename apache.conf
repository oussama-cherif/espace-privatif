<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    PassEnv DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD
    PassEnv JWT_SECRET APP_BASE_URL WS_URL SOTHIS_WS_URL
    PassEnv MAIL_HOST MAIL_PORT MAIL_USERNAME MAIL_PASSWORD MAIL_FROM MAIL_FROM_NAME

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
